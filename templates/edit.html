<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>✏️ Edit Task</h1>

    <form method="POST">

        <label>Subject</label>
        <br>
        <input
            type="text"
            name="subject"
            value="{{ task[1] }}"
            required>
        <br><br>

        <label>Task</label>
        <br>
        <input
            type="text"
            name="task"
            value="{{ task[2] }}"
            required>
        <br><br>

        <label>Deadline</label>
        <br>
        <input
            type="date"
            name="deadline"
            value="{{ task[3] }}"
            required>
        <br><br>

        <button type="submit">💾 Save Changes</button>

    </form>

    <br>

    <div style="text-align:center;">
        <a href="/">⬅️ Back to Home</a>
    </div>

</body>
</html>
